<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeopleOS — HRIS Onboarding Platform</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 14px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f3;
    color: #1a1a18;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── CSS Variables (light mode) ── */
  :root {
    --bg:        #ffffff;
    --bg2:       #f5f5f3;
    --bg3:       #eeede9;
    --bg4:       #e4e3de;
    --border:    rgba(0,0,0,0.10);
    --border2:   rgba(0,0,0,0.18);
    --text:      #1a1a18;
    --text2:     #5a5a57;
    --text3:     #9a9a96;
    --success:   #3b6d11;
    --success-bg:#eaf3de;
    --warning:   #854f0b;
    --warning-bg:#faeeda;
    --info:      #185fa5;
    --info-bg:   #e6f1fb;
    --danger:    #a32d2d;
    --danger-bg: #fcebeb;
    --r:         8px;
    --r2:        12px;
    --r3:        16px;
  }

  /* ── Dark mode ── */
  @media (prefers-color-scheme: dark) {
    body { background: #111110; color: #e8e8e4; }
    :root {
      --bg: #1c1c1a; --bg2: #111110; --bg3: #252523; --bg4: #2e2e2b;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #e8e8e4; --text2: #9a9a94; --text3: #5a5a56;
      --success: #97c459; --success-bg: #1a2a10;
      --warning: #ef9f27; --warning-bg: #2a1e08;
      --info: #85b7eb;    --info-bg: #0c1e30;
      --danger: #f09595;  --danger-bg: #2a1010;
    }
  }

  /* ── Layout ── */
  .shell { display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: var(--bg);
    border-right: 0.5px solid var(--border);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .logo {
    padding: 18px 16px 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .logo-row { display: flex; align-items: center; gap: 9px; }
  .logo-sq {
    width: 28px; height: 28px;
    background: var(--text); border-radius: 7px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-sq svg { width: 15px; height: 15px; fill: var(--bg); }
  .logo-name { font-size: 13px; font-weight: 600; letter-spacing: .2px; }
  .logo-tag  { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .view-bar {
    margin: 10px; display: grid; grid-template-columns: 1fr 1fr;
    background: var(--bg2); border-radius: var(--r); padding: 3px; gap: 3px;
  }
  .vb {
    border: none; background: transparent; padding: 6px 4px;
    border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 500;
    font-family: inherit; color: var(--text2); transition: .15s;
  }
  .vb.on {
    background: var(--bg); color: var(--text);
    border: 0.5px solid var(--border2);
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }

  .nav { padding: 6px 8px; flex: 1; }
  .ns {
    font-size: 10px; font-weight: 600; color: var(--text3);
    letter-spacing: .7px; text-transform: uppercase;
    padding: 10px 6px 5px;
  }
  .ni {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 8px; border-radius: var(--r);
    cursor: pointer; color: var(--text2); transition: .12s;
    margin-bottom: 1px; font-size: 12.5px;
  }
  .ni:hover { background: var(--bg2); color: var(--text); }
  .ni.on    { background: var(--bg2); color: var(--text); font-weight: 600; }
  .nb {
    margin-left: auto; background: var(--text); color: var(--bg);
    border-radius: 10px; font-size: 10px; padding: 1px 6px; font-weight: 600;
  }

  .sf { padding: 10px; border-top: 0.5px solid var(--border); }
  .uc {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: var(--r); cursor: pointer;
  }
  .uc:hover { background: var(--bg2); }
  .uav {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--info-bg); color: var(--info);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; flex-shrink: 0;
  }
  .un  { font-size: 12px; font-weight: 600; }
  .ur  { font-size: 10px; color: var(--text3); }

  /* ── Main area ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .topbar {
    background: var(--bg); border-bottom: 0.5px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 10;
  }
  .tb-title { font-size: 15px; font-weight: 600; flex: 1; }
  .tb-sub   { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .content { padding: 20px 24px; flex: 1; }

  /* ── Buttons ── */
  .btn {
    padding: 6px 13px; border-radius: var(--r);
    border: 0.5px solid var(--border2); cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 500; transition: .12s;
    display: inline-flex; align-items: center; gap: 5px;
    background: transparent; color: var(--text);
  }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(.98); }
  .btn-fill { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-fill:hover { opacity: .85; background: var(--text); }

  /* ── Cards ── */
  .card {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--r2); padding: 18px 20px; margin-bottom: 14px;
  }
  .card-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font-size: 13px; font-weight: 600; }
  .card-sub   { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ── Stats ── */
  .stats { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 14px; }
  .sc { background: var(--bg2); border-radius: var(--r); padding: 14px; }
  .sc-n { font-size: 22px; font-weight: 700; margin: 4px 0 2px; letter-spacing: -.5px; }
  .sc-l { font-size: 11px; color: var(--text3); font-weight: 500; }
  .sc-d { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* ── Grids ── */
  .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }

  /* ── Progress bar ── */
  .pbar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 5px; }
  .pfill { height: 100%; border-radius: 2px; background: var(--text); transition: width .5s; }
  .pfill.g { background: var(--success); }
  .pfill.a { background: var(--warning); }
  .pfill.d { background: var(--text3); }

  /* ── Badges ── */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .bg { background: var(--success-bg); color: var(--success); }
  .ba { background: var(--warning-bg); color: var(--warning); }
  .bd { background: var(--bg3);        color: var(--text2); }
  .bi { background: var(--info-bg);    color: var(--info); }
  .br { background: var(--danger-bg);  color: var(--danger); }

  /* ── Hire rows ── */
  .hire-row {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 0; border-bottom: 0.5px solid var(--border); cursor: pointer;
  }
  .hire-row:last-child { border: none; padding-bottom: 0; }
  .hire-row:hover .hr-name { color: var(--info); }
  .hr-av {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; flex-shrink: 0;
  }
  .hr-name { font-size: 13px; font-weight: 600; transition: .1s; }
  .hr-role { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* ── Doc rows ── */
  .doc-row {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; background: var(--bg2);
    border-radius: var(--r); margin-bottom: 7px;
    cursor: pointer; transition: .12s;
  }
  .doc-row:hover { background: var(--bg3); }
  .doc-ic {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--bg); border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .doc-name { font-size: 12.5px; font-weight: 600; }
  .doc-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* ── Timeline ── */
  .tl { padding-left: 16px; position: relative; }
  .tl::before { content: ''; position: absolute; left: 5px; top: 4px; bottom: 12px; width: 0.5px; background: var(--border2); }
  .tl-item { position: relative; padding: 0 0 16px 18px; }
  .tl-dot  { position: absolute; left: -11px; top: 3px; width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid; }
  .tl-dot.done { background: var(--success); border-color: var(--success); }
  .tl-dot.now  { background: var(--info);    border-color: var(--info); }
  .tl-dot.pend { background: var(--bg);      border-color: var(--border2); }
  .tl-t { font-size: 12.5px; font-weight: 600; }
  .tl-s { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* ── Checklist ── */
  .cl-item {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 9px 0; border-bottom: 0.5px solid var(--border); cursor: pointer;
  }
  .cl-item:last-child { border: none; }
  .cl-box {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1px solid var(--border2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: .12s; background: transparent;
  }
  .cl-box.ck { background: var(--success); border-color: var(--success); }
  .cl-box svg { width: 9px; height: 9px; }
  .cl-txt { font-size: 12.5px; flex: 1; }
  .cl-txt.done { color: var(--text3); text-decoration: line-through; }
  .cl-tag { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* ── Courses ── */
  .course-row {
    display: flex; gap: 12px; align-items: center;
    padding: 10px 0; border-bottom: 0.5px solid var(--border);
  }
  .course-row:last-child { border: none; }
  .course-ic {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--bg2); display: flex; align-items: center;
    justify-content: center; font-size: 15px; flex-shrink: 0;
  }
  .course-name { font-size: 12.5px; font-weight: 600; margin-bottom: 2px; }
  .course-meta { font-size: 11px; color: var(--text3); }

  /* ── Team cards ── */
  .team-card {
    background: var(--bg2); border-radius: var(--r);
    padding: 12px; text-align: center; cursor: pointer; transition: .12s;
  }
  .team-card:hover { background: var(--bg3); }
  .ta {
    width: 36px; height: 36px; border-radius: 50%;
    margin: 0 auto 7px; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 600;
  }
  .tc-n { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .tc-r { font-size: 10px; color: var(--text3); }

  /* ── IT / Policy rows ── */
  .it-row, .pol-row {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 0; border-bottom: 0.5px solid var(--border);
  }
  .it-row:last-child, .pol-row:last-child { border: none; }
  .it-ic {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--bg2); display: flex; align-items: center;
    justify-content: center; font-size: 14px; flex-shrink: 0;
  }

  /* ── Bar chart rows ── */
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .bl { width: 90px; color: var(--text2); flex-shrink: 0; font-size: 11px; }
  .bt { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .bf { height: 100%; border-radius: 2px; }
  .bv { width: 28px; text-align: right; font-size: 11px; color: var(--text2); flex-shrink: 0; }

  /* ── Welcome band ── */
  .welcome-band {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--r2); padding: 22px 24px; margin-bottom: 14px;
  }
  .wb-h { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .wb-s { font-size: 12.5px; color: var(--text2); margin-bottom: 16px; }
  .wb-prog {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; background: var(--bg2); border-radius: var(--r);
  }
  .wb-pb { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .wb-pf { height: 100%; background: var(--text); border-radius: 3px; }

  /* ── Slide-in Panel ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.25);
    z-index: 90; opacity: 0; pointer-events: none; transition: .2s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .panel {
    position: fixed; right: 0; top: 0; height: 100%; width: 340px;
    background: var(--bg); border-left: 0.5px solid var(--border);
    z-index: 91; transform: translateX(100%); transition: .25s;
    display: flex; flex-direction: column;
  }
  .panel.open { transform: none; }
  .ph {
    padding: 16px 18px; border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .px {
    margin-left: auto; background: transparent;
    border: 0.5px solid var(--border2); border-radius: 6px;
    width: 26px; height: 26px; cursor: pointer; font-size: 14px;
    color: var(--text2); display: flex; align-items: center; justify-content: center;
    line-height: 1; font-family: inherit;
  }
  .px:hover { background: var(--bg2); }
  .pb { flex: 1; overflow-y: auto; padding: 18px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--r2); padding: 11px 15px; z-index: 999;
    font-size: 12.5px; transform: translateY(60px); opacity: 0;
    transition: .25s; max-width: 260px;
  }
  .toast.show { transform: none; opacity: 1; }
  .toast-t { font-weight: 600; margin-bottom: 2px; color: var(--success); }

  /* ── Table ── */
  .htable { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .htable th {
    font-size: 11px; color: var(--text3); font-weight: 500;
    text-align: left; padding: 10px 12px;
    border-bottom: 0.5px solid var(--border);
  }
  .htable td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); font-size: 12.5px; vertical-align: middle; }
  .htable tr:last-child td { border: none; }
  .htable tbody tr { cursor: pointer; }
  .htable tbody tr:hover td { background: var(--bg2); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  /* ── Responsive ── */
  @media (max-width: 760px) {
    .sidebar { width: 200px; }
    .stats   { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid2   { grid-template-columns: 1fr; }
    .grid3   { grid-template-columns: repeat(2, minmax(0,1fr)); }
  }
  @media (max-width: 560px) {
    .sidebar { display: none; }
    .stats   { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="shell">

  <!-- ══ Sidebar ══ -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-row">
        <div class="logo-sq">
          <svg viewBox="0 0 20 20"><path d="M10 2L3 6v4c0 4.4 3 8.5 7 9.5 4-1 7-5.1 7-9.5V6L10 2z"/></svg>
        </div>
        <div>
          <div class="logo-name">PeopleOS</div>
          <div class="logo-tag">HRIS · Corporate Onboarding</div>
        </div>
      </div>
    </div>

    <div class="view-bar">
      <button class="vb on" onclick="setView('hr')">HR Admin</button>
      <button class="vb"    onclick="setView('emp')">Employee</button>
    </div>

    <nav class="nav" id="nav"></nav>

    <div class="sf">
      <div class="uc">
        <div class="uav" id="sav">AK</div>
        <div>
          <div class="un" id="sun">Anjali K.</div>
          <div class="ur" id="sur">HR Manager</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ══ Main ══ -->
  <div class="main">
    <header id="topbar" class="topbar"></header>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ══ Slide Panel ══ -->
<div class="overlay" id="ov" onclick="closePanel()"></div>
<div class="panel"   id="panel">
  <div class="ph" id="ph"></div>
  <div class="pb" id="pb"></div>
</div>

<!-- ══ Toast ══ -->
<div class="toast" id="toast">
  <div class="toast-t" id="tt"></div>
  <div id="tm"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let view = 'hr', page = 'dash', checks = {};

const hires = [
  { id:1, name:'Rohan Mehta',  ini:'RM', dept:'Engineering', role:'Senior Developer',    start:'Apr 14', prog:72,  status:'In Progress', clr:'#378ADD' },
  { id:2, name:'Priya Sharma', ini:'PS', dept:'Design',      role:'UI/UX Designer',      start:'Apr 10', prog:100, status:'Complete',    clr:'#639922' },
  { id:3, name:'Kiran Nair',   ini:'KN', dept:'Sales',       role:'Account Manager',     start:'Apr 21', prog:18,  status:'In Progress', clr:'#BA7517' },
  { id:4, name:'Divya Iyer',   ini:'DI', dept:'Marketing',   role:'Content Lead',        start:'Apr 17', prog:45,  status:'In Progress', clr:'#7F77DD' },
  { id:5, name:'Arjun Rao',    ini:'AR', dept:'Finance',     role:'Financial Analyst',   start:'Apr 28', prog:0,   status:'Upcoming',    clr:'#1D9E75' },
];

const hrNav = [
  { s:'Overview', items:[
    { id:'dash',     l:'Dashboard' },
    { id:'hires',    l:'New Hires', b:'5' },
  ]},
  { s:'Onboarding Modules', items:[
    { id:'docs',     l:'Documents & e-Signatures' },
    { id:'tasks',    l:'Task Checklists' },
    { id:'training', l:'Training & Courses' },
    { id:'policies', l:'Policy Acknowledgements' },
    { id:'it',       l:'IT Provisioning' },
    { id:'team',     l:'Team & Org Chart' },
  ]},
];

const empNav = [
  { s:'My Onboarding', items:[
    { id:'welcome',    l:'Welcome' },
    { id:'mytasks',    l:'My Tasks', b:'5' },
    { id:'mydocs',     l:'My Documents' },
  ]},
  { s:'Learn & Connect', items:[
    { id:'mycourses',  l:'Training & Courses' },
    { id:'myteam',     l:'Meet the Team' },
    { id:'mypolicies', l:'Policies' },
  ]},
  { s:'Setup', items:[
    { id:'myit',       l:'IT & Equipment' },
  ]},
];

/* ═══════════════════════════════════════════
   VIEW SWITCHING
═══════════════════════════════════════════ */
function setView(v) {
  view = v;
  page = v === 'hr' ? 'dash' : 'welcome';
  document.querySelectorAll('.vb').forEach((b, i) =>
    b.classList.toggle('on', (v==='hr' && i===0) || (v==='emp' && i===1))
  );
  if (v === 'hr') {
    document.getElementById('sav').textContent = 'AK';
    document.getElementById('sun').textContent = 'Anjali K.';
    document.getElementById('sur').textContent = 'HR Manager';
  } else {
    document.getElementById('sav').textContent = 'RM';
    document.getElementById('sun').textContent = 'Rohan M.';
    document.getElementById('sur').textContent = 'New Hire · Engineering';
  }
  renderNav();
  renderPage();
}

function goTo(p) { page = p; renderNav(); renderPage(); }

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
function renderNav() {
  const n = view === 'hr' ? hrNav : empNav;
  document.getElementById('nav').innerHTML = n.map(s => `
    <div class="ns">${s.s}</div>
    ${s.items.map(i => `
      <div class="ni${i.id === page ? ' on' : ''}" onclick="goTo('${i.id}')">
        <span>${i.l}</span>
        ${i.b ? `<span class="nb">${i.b}</span>` : ''}
      </div>
    `).join('')}
  `).join('');
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function setTopbar(title, sub, btn = '') {
  document.getElementById('topbar').innerHTML = `
    <div style="flex:1">
      <div class="tb-title">${title}</div>
      ${sub ? `<div class="tb-sub">${sub}</div>` : ''}
    </div>
    ${btn}
  `;
}

function pclass(p) { return p === 100 ? 'g' : p > 0 ? 'a' : 'd'; }

function sbadge(s) {
  const m = { 'Complete':'bg', 'In Progress':'bi', 'Upcoming':'bd', 'Not Started':'bd' };
  return `<span class="badge ${m[s] || 'bd'}">${s}</span>`;
}

function toast(t, m) {
  document.getElementById('tt').textContent = t;
  document.getElementById('tm').textContent = m;
  const el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function toggleCheck(id) {
  checks[id] = !checks[id];
  const box  = document.getElementById('cb_' + id);
  const text = document.getElementById('ct_' + id);
  if (box) {
    box.classList.toggle('ck', !!checks[id]);
    box.innerHTML = checks[id]
      ? '<svg viewBox="0 0 10 8" fill="none"><polyline points="1,4 3.5,6.5 9,1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : '';
  }
  if (text) text.classList.toggle('done', !!checks[id]);
}

const CHECK_SVG = '<svg viewBox="0 0 10 8" fill="none"><polyline points="1,4 3.5,6.5 9,1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function clItem(id, label, tag, isDone) {
  return `
    <div class="cl-item" onclick="toggleCheck('${id}')">
      <div class="cl-box${isDone ? ' ck' : ''}" id="cb_${id}">${isDone ? CHECK_SVG : ''}</div>
      <div>
        <div class="cl-txt${isDone ? ' done' : ''}" id="ct_${id}">${label}</div>
        ${tag ? `<div class="cl-tag">${tag}</div>` : ''}
      </div>
    </div>`;
}
